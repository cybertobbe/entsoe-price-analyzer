spring.application.name=entsoe-price-analyzer
server.port=8088

# MySQL (samma databas som entsoe-db-service)
spring.datasource.url=jdbc:mysql://192.168.0.6:3307/entsoe
spring.datasource.username=${MYSQL_USER:entsoe}
spring.datasource.password=${MYSQL_PASSWORD:entsoe}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Exchange rate (fallback)
exchange.rate.eur.sek=${EXCHANGE_RATE_EUR_SEK:11.50}

# Spring Boot Admin
spring.boot.admin.client.url=http://192.168.0.6:8085
spring.boot.admin.client.instance.metadata.user.name=${SPRING_SECURITY_USER_NAME:user}
spring.boot.admin.client.instance.metadata.user.password=${SPRING_SECURITY_USER_PASSWORD:yourpassword}
spring.boot.admin.client.instance.service-base-url=http://192.168.0.6:8088

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Logging
logging.file.name=/app/logs/application.log

spring.main.allow-bean-definition-overriding=true

management.endpoint.prometheus.access=unrestricted